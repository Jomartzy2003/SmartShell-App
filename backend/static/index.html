<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartShell App</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#121212',
                        glass: 'rgba(30,30,30,0.8)',
                    },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <script>
        const simulateCrash = () => {
            fetch("http://" + window.location.hostname + ":8000/hardware_crash", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    rider_id: 1,
                    latitude: 14.3314,
                    longitude: 121.0805
                }),
            })
                .then(res => res.json())
                .then(data => console.log("Crash Simulated:", data));
        };
    </script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-glass {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            padding: 0.75rem;
            color: #fff;
            width: 100%;
            margin-bottom: 1rem;
        }

        .input-glass:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            padding: 0.75rem;
            border-radius: 0.5rem;
            width: 100%;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 0.75rem;
            border-radius: 0.5rem;
            width: 100%;
            font-weight: bold;
        }

        .pulse-red-ring {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            animation: pulse-ring 1.5s infinite;
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            70% {
                box-shadow: 0 0 0 30px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // API URL
        const API_BASE = "http://" + window.location.hostname + ":8000";

        // Components
        function Input({ placeholder, type = "text", value, onChange }) {
            return <input class="input-glass" type={type} placeholder={placeholder} value={value} onChange={e => onChange(e.target.value)} />
        }

        // --- AUTH SCREENS ---
        function LoginScreen({ onNavigate, onSuccess }) {
            const [mobile, setMobile] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async () => {
                setLoading(true); setError('');
                try {
                    const res = await fetch(`${API_BASE}/login`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mobile_number: mobile })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Login failed");
                    onNavigate('VERIFY_LOGIN', { mobile });
                } catch (e) {
                    setError(e.message);
                }
                setLoading(false);
            }

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="glass-panel p-8 w-full max-w-sm">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-bold tracking-tight text-white mb-2">SmartShell</h1>
                            <p className="text-gray-400">Rider Login</p>
                        </div>
                        {error && <div className="bg-red-900/50 border border-red-500 text-red-200 p-3 rounded mb-4 text-sm">{error}</div>}
                        <Input placeholder="Mobile Number (e.g. +639...)" value={mobile} onChange={setMobile} />
                        <button className="btn-primary mt-4" onClick={handleLogin} disabled={loading}>
                            {loading ? 'Sending SMS...' : 'Login via SMS'}
                        </button>
                        <div className="text-center mt-6">
                            <p className="text-gray-400 text-sm">New rider? <span className="text-blue-400 cursor-pointer" onClick={() => onNavigate('REGISTER')}>Register here</span></p>
                            <p className="text-gray-500 text-xs mt-4 cursor-pointer" onClick={() => onNavigate('DASHBOARD')}>Go to Emergency Dashboard</p>
                        </div>
                    </div>
                </div>
            );
        }

        function RegisterScreen({ onNavigate }) {
            const [form, setForm] = useState({ name: '', mobile_number: '', place: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleRegister = async () => {
                setLoading(true); setError('');
                try {
                    const res = await fetch(`${API_BASE}/register`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(form)
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Registration failed");
                    onNavigate('VERIFY_REGISTER', { mobile: form.mobile_number });
                } catch (e) {
                    setError(e.message);
                }
                setLoading(false);
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="glass-panel p-8 w-full max-w-md">
                        <h2 className="text-2xl font-bold mb-6 text-center">Create Account</h2>
                        {error && <div className="bg-red-900/50 border border-red-500 text-red-200 p-3 rounded mb-4 text-sm">{error}</div>}
                        <Input placeholder="Full Name" value={form.name} onChange={v => setForm({ ...form, name: v })} />
                        <Input placeholder="Mobile Number (+639...)" value={form.mobile_number} onChange={v => setForm({ ...form, mobile_number: v })} />
                        <Input placeholder="Place in Binan Laguna" value={form.place} onChange={v => setForm({ ...form, place: v })} />

                        <button className="btn-primary mt-2" onClick={handleRegister} disabled={loading}>
                            {loading ? 'Processing...' : 'Register'}
                        </button>
                        <div className="text-center mt-4">
                            <span className="text-gray-400 text-sm cursor-pointer hover:text-white" onClick={() => onNavigate('LOGIN')}>Back to Login</span>
                        </div>
                    </div>
                </div>
            );
        }

        function VerifyScreen({ mobile, isLoginFlow, onNavigate, onSuccess }) {
            const [code, setCode] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleVerify = async () => {
                setLoading(true); setError('');
                const endpoint = isLoginFlow ? '/login_verify' : '/verify';
                try {
                    const res = await fetch(`${API_BASE}${endpoint}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mobile_number: mobile, code })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Verification failed");

                    if (isLoginFlow) {
                        onSuccess(data.rider);
                    } else {
                        // Registration verify complete, now login
                        onNavigate('LOGIN');
                    }
                } catch (e) {
                    setError(e.message);
                }
                setLoading(false);
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="glass-panel p-8 w-full max-w-sm text-center">
                        <h2 className="text-2xl font-bold mb-2">Verify SMS</h2>
                        <p className="text-gray-400 text-sm mb-6">Enter the 4-digit code sent to<br />{mobile}</p>
                        {error && <div className="bg-red-900/50 border border-red-500 text-red-200 p-3 rounded mb-4 text-sm">{error}</div>}
                        <Input type="number" placeholder="0000" value={code} onChange={setCode} />
                        <button className="btn-primary mt-2" onClick={handleVerify} disabled={loading}>
                            Verify & Continue
                        </button>
                    </div>
                </div>
            );
        }

        function RiderAppScreen({ rider, onLogout }) {
            const [status, setStatus] = useState('SAFE');
            const [countdown, setCountdown] = useState(5);
            const ws = useRef(null);
            const recognition = useRef(null);
            const timerRef = useRef(null);
            const [contacts, setContacts] = useState([]);
            const [newContactName, setNewContactName] = useState('');
            const [newContactPhone, setNewContactPhone] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [editForm, setEditForm] = useState({ name: '', phone_number: '', priority: 1 });

            useEffect(() => {
                if (rider && rider.id) {
                    fetch(`${API_BASE}/contacts/${rider.id}`)
                        .then(res => res.json())
                        .then(data => setContacts(data))
                        .catch(err => console.error(err));
                }
            }, [rider]);

            const addContact = async () => {

                if (!newContactName || !newContactPhone) return;


                if (contacts.length >= 3) {
                    alert("Maximum of 3 contacts allowed. Please delete one first.");
                    return;
                }

                const res = await fetch(`${API_BASE}/contacts/${rider.id}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newContactName, phone_number: newContactPhone, priority: 1 })
                });

                if (res.ok) {
                    const data = await res.json();
                    setContacts([...contacts, data]);
                    setNewContactName('');
                    setNewContactPhone('');
                } else {
                    const errorData = await res.json();
                    alert(errorData.detail || "Failed to add contact");
                }
            };

            const handleUpdate = async (id) => {
                if (!editForm.name || !editForm.phone_number) return;
                try {
                    const res = await fetch(`${API_BASE}/contacts/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name: editForm.name,
                            phone_number: editForm.phone_number,
                            priority: 1
                        })
                    });

                    if (res.ok) {
                        setEditingId(null);
                        const updatedRes = await fetch(`${API_BASE}/contacts/${rider.id}`);
                        const updatedData = await updatedRes.json();
                        setContacts(updatedData);
                    }
                } catch (err) {
                    console.error("Update Error:", err);
                }
            };

            const deleteContact = async (id) => {
                await fetch(`${API_BASE}/contacts/${id}`, { method: 'DELETE' });
                setContacts(contacts.filter(c => c.id !== id));
            };

            useEffect(() => {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws.current = new WebSocket(`ws://${window.location.hostname}:8000/ws/rider`);

                ws.current.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.event === "CRASH_DETECTED" && data.rider_id === rider.id) {
                        triggerCrashRoutine();
                    }
                };


                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    recognition.current = new SpeechRecognition();
                    recognition.current.continuous = true;

                    recognition.current.interimResults = true;

                    recognition.current.onresult = (event) => {
                        let transcript = "";
                        for (let i = event.resultIndex; i < event.results.length; ++i) {
                            transcript += event.results[i][0].transcript;
                        }
                        transcript = transcript.toLowerCase();
                        console.log("Speech heard:", transcript);

                        if (transcript.includes("cancel") || transcript.includes("i am okay") || transcript.includes("im ok")) {
                            cancelAlarm();
                        }
                    };
                }

                return () => {
                    if (ws.current) ws.current.close();
                    if (recognition.current) recognition.current.stop();
                    clearTimeout(timerRef.current);
                }
            }, []);

            // Handle Countdown
            useEffect(() => {
                if (status === 'CRASH_COUNTDOWN' && countdown > 0) {
                    timerRef.current = setTimeout(() => {
                        setCountdown(c => c - 1);
                    }, 1000);
                } else if (status === 'CRASH_COUNTDOWN' && countdown === 0) {
                    dispatchAlert();
                }
                return () => clearTimeout(timerRef.current);
            }, [status, countdown]);

            const triggerCrashRoutine = () => {
                setStatus('CRASH_COUNTDOWN');
                setCountdown(5);
                if (recognition.current) {
                    try { recognition.current.start(); } catch (e) { } // ignore if already started
                }
            };

            const cancelAlarm = () => {
                setStatus('SAFE');
                clearTimeout(timerRef.current);
                if (recognition.current) recognition.current.stop();
                if (ws.current) ws.current.send(JSON.stringify({ event: "CANCELLED", rider_id: rider.id }));
                speak("Alarm cancelled. Glad you are okay.");
            };

            const dispatchAlert = () => {
                setStatus('SAFE');
                speak("Timeout reached. Emergency alerts are being sent by the system.");
            };

            const speak = (msg) => {
                const utterance = new SpeechSynthesisUtterance(msg);
                window.speechSynthesis.speak(utterance);
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4 relative overflow-hidden">
                    {/* Background indicator */}
                    {status === 'CRASH_COUNTDOWN' && <div className="absolute inset-0 bg-red-900 opacity-50 animate-pulse-fast pointer-events-none"></div>}

                    <div className={`glass-panel p-8 w-full max-w-md text-center z-10 transition-all ${status === 'CRASH_COUNTDOWN' ? 'border-red-500 pulse-red-ring scale-105' : 'border-blue-500/30'}`}>
                        {status === 'SAFE' ? (
                            <>
                                <div className="h-24 w-24 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <svg className="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                </div>
                                <h1 className="text-3xl font-bold mb-2">System Active</h1>
                                <p className="text-gray-400 mb-6">Helmet connection stable. Ride safe, {rider.name}!</p>

                                <div className="bg-black/30 p-4 rounded-lg text-left text-sm text-gray-300 mb-6 w-full max-w-sm">
                                    <p className="mb-2 italic border-b border-gray-600 pb-2"><strong>Location:</strong> {rider.place}</p>
                                    <h3 className="font-bold text-white mb-2">Emergency Contacts</h3>
                                    <div className="max-h-32 overflow-y-auto pr-1">
                                        {contacts.length === 0 ? (
                                            <p className="text-gray-500 text-xs text-center">No contacts added.</p>
                                        ) : (
                                            contacts.map(c => (
                                                <div key={c.id} className="bg-gray-800/50 p-2 rounded mb-2 border border-gray-700/50">
                                                    {editingId === c.id ? (
                                                        /* --- EDIT MODE --- */
                                                        <div className="flex flex-col gap-1">
                                                            <input
                                                                className="bg-gray-900 border border-blue-500 rounded p-1 text-[10px] text-white"
                                                                value={editForm.name}
                                                                onChange={(e) => setEditForm({ ...editForm, name: e.target.value })}
                                                            />
                                                            <input
                                                                className="bg-gray-900 border border-blue-500 rounded p-1 text-[10px] text-white"
                                                                value={editForm.phone_number}
                                                                onChange={(e) => setEditForm({ ...editForm, phone_number: e.target.value })}
                                                            />
                                                            <div className="flex gap-2 justify-end mt-1">
                                                                <button className="text-[10px] bg-green-700 px-2 py-0.5 rounded text-white" onClick={() => handleUpdate(c.id)}>Save</button>
                                                                <button className="text-[10px] bg-gray-600 px-2 py-0.5 rounded text-white" onClick={() => setEditingId(null)}>Cancel</button>
                                                            </div>
                                                        </div>
                                                    ) : (
                                                        /* --- VIEW MODE --- */
                                                        <div className="flex justify-between items-center">
                                                            <div>
                                                                <div className="font-bold text-white text-xs">{c.name}</div>
                                                                <div className="text-[10px] text-gray-400">{c.phone_number}</div>
                                                            </div>
                                                            <div className="flex gap-2 items-center">
                                                                <button
                                                                    className="text-blue-400 text-[10px] hover:underline"
                                                                    onClick={() => {
                                                                        setEditingId(c.id);
                                                                        setEditForm({ name: c.name, phone_number: c.phone_number, priority: 1 });
                                                                    }}
                                                                >
                                                                    Edit
                                                                </button>
                                                                <button onClick={() => deleteContact(c.id)} className="text-red-400 font-bold hover:text-red-300 text-lg">&times;</button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            ))
                                        )}
                                    </div>
                                    <div className="mt-4 flex flex-col gap-2">
                                        <input className="bg-gray-900 border border-gray-700 rounded p-2 text-white text-sm" placeholder="Contact Name" value={newContactName} onChange={(e) => setNewContactName(e.target.value)} />
                                        <input className="bg-gray-900 border border-gray-700 rounded p-2 text-white text-sm" type="tel" placeholder="Phone Number" value={newContactPhone} onChange={(e) => setNewContactPhone(e.target.value)} />
                                        <button className="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 rounded text-sm transition" onClick={addContact}>+ Add Contact</button>
                                    </div>
                                </div>

                                <button className="text-sm text-gray-500 hover:text-white" onClick={onLogout}>Logout</button>

                                {/* Hidden trigger for testing */}
                                <div className="mt-8 pt-4 border-t border-gray-700">
                                    <button onClick={() => fetch(`${API_BASE}/hardware_crash`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ rider_id: rider.id, latitude: 14.3314, longitude: 121.0805 }) })} className="text-xs bg-gray-800 px-3 py-1 rounded text-gray-400 hover:bg-gray-700 transition">Simulate Crash Signal (from Pi)</button>
                                </div>
                            </>
                        ) : (
                            <>
                                <h1 className="text-4xl font-bold text-red-500 mb-2 uppercase animate-pulse">Crash Detected</h1>
                                <p className="text-xl mb-6 font-semibold">Alerting in...</p>
                                <div className="text-8xl font-black text-white mb-8">{countdown}</div>
                                <p className="text-gray-300 mb-6 bg-black/50 p-3 rounded text-sm border border-red-500/50">
                                    Say <strong className="text-white">"CANCEL"</strong> or <strong className="text-white">"I AM OKAY"</strong> to abort.
                                </p>
                                <button className="btn-danger text-xl shadow-lg shadow-red-500/50" onClick={cancelAlarm}>TAP TO CANCEL</button>
                            </>
                        )}
                    </div>
                </div>
            )
        }

        function DashboardScreen({ onNavigate }) {
            const [logs, setLogs] = useState([{ msg: 'Monitoring started', time: new Date(), type: 'info' }]);
            const [riderStatus, setRiderStatus] = useState('SAFE');
            const [alertData, setAlertData] = useState(null);

            useEffect(() => {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//{window.location.hostname}:8000/ws/dashboard`;

                let ws = new WebSocket(wsUrl);

                ws.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    const time = new Date();
                    if (data.event === "CRASH_DETECTED") {
                        setRiderStatus('CRASH');
                        setAlertData(null);
                        setLogs(prev => [{ msg: 'Hardware trigger: Crash detected! 5s countdown started.', time, type: 'error' }, ...prev]);
                    } else if (data.event === "RESOLVED" || data.event === "CANCELLED") {
                        setRiderStatus('SAFE');
                        setLogs(prev => [{ msg: 'Emergency aborted by rider voice command or tap.', time, type: 'success' }, ...prev]);
                    } else if (data.event === "ALERT_DISPATCHED") {
                        setRiderStatus('DISPATCHED');
                        setAlertData({ lat: data.lat, lng: data.lng });
                        setLogs(prev => [{ msg: `CRITICAL: Alert dispatched! GPS: ${data.lat}, ${data.lng}`, time, type: 'error' }, ...prev]);
                    }
                };

                return () => ws.close();
            }, []);

            return (
                <div className="flex flex-col items-center p-6 min-h-screen">
                    <div className="w-full max-w-4xl glass-panel p-6">
                        <header className="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
                            <div>
                                <h1 className="text-2xl font-bold">SmartShell <span className="text-blue-500">Dashboard</span></h1>
                                <p className="text-sm text-gray-400">Emergency Contact View</p>
                            </div>
                            <button className="text-sm border border-gray-600 px-3 py-1 rounded hover:bg-gray-800" onClick={() => onNavigate('LOGIN')}>Switch App</button>
                        </header>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className={`glass-panel p-6 border-l-4 transition-colors ${riderStatus === 'SAFE' ? 'border-green-500' : 'border-red-500 bg-red-900/20'}`}>
                                <h2 className="text-lg font-semibold mb-2">Rider Status</h2>
                                <div className={`text-4xl font-bold mb-4 ${riderStatus === 'SAFE' ? 'text-green-500' : 'text-red-500'}`}>
                                    {riderStatus === 'CRASH' ? 'CRASH DETECTED' : riderStatus === 'DISPATCHED' ? 'EMERGENCY ALERT!' : 'SAFE'}
                                </div>
                                {alertData && (
                                    <a href={`https://maps.google.com/?q=${alertData.lat},${alertData.lng}`} target="_blank" className="btn-danger inline-block text-center shadow-lg shadow-red-500/50">
                                        Open GPS Location
                                    </a>
                                )}
                            </div>

                            <div className="glass-panel p-4">
                                <h2 className="text-lg font-semibold mb-3">Live Log</h2>
                                <div className="space-y-3 h-48 overflow-y-auto text-sm pr-2">
                                    {logs.map((log, i) => (
                                        <div key={i} className="border-b border-gray-800 pb-2">
                                            <span className="text-gray-500 text-xs">[{log.time.toLocaleTimeString()}]</span>
                                            <span className={`ml-2 ${log.type === 'error' ? 'text-red-400' : log.type === 'success' ? 'text-green-400' : 'text-blue-300'}`}>{log.msg}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            )
        }

        // --- APP CONTAINER ---
        function App() {
            // Screens: LOGIN, REGISTER, VERIFY_REGISTER, VERIFY_LOGIN, RIDER_APP, DASHBOARD
            const [screen, setScreen] = useState('LOGIN');
            const [navProps, setNavProps] = useState({});
            const [rider, setRider] = useState(null);

            const handleNavigate = (newScreen, params = {}) => {
                setScreen(newScreen);
                setNavProps(params);
            };

            const handleLoginSuccess = (riderData) => {
                setRider(riderData);
                setScreen('RIDER_APP');
            };

            return (
                <div className="w-full h-full text-white">
                    {screen === 'LOGIN' && <LoginScreen onNavigate={handleNavigate} onSuccess={handleLoginSuccess} />}
                    {screen === 'REGISTER' && <RegisterScreen onNavigate={handleNavigate} />}
                    {screen === 'VERIFY_REGISTER' && <VerifyScreen mobile={navProps.mobile} isLoginFlow={false} onNavigate={handleNavigate} />}
                    {screen === 'VERIFY_LOGIN' && <VerifyScreen mobile={navProps.mobile} isLoginFlow={true} onNavigate={handleNavigate} onSuccess={handleLoginSuccess} />}
                    {screen === 'RIDER_APP' && <RiderAppScreen rider={rider} onLogout={() => handleNavigate('LOGIN')} />}
                    {screen === 'DASHBOARD' && <DashboardScreen onNavigate={handleNavigate} />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
